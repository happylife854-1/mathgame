<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高二先修：三角記憶翻牌戰</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #2c3e50; margin: 0 0 10px 0; }
        .controls { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; }
        button { padding: 10px 20px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.2s; }
        .btn-start { background-color: #2ecc71; }
        button:active { transform: scale(0.95); }
        
        .game-info { display: flex; justify-content: space-between; width: 100%; max-width: 600px; font-size: 18px; font-weight: bold; color: #e74c3c; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; max-width: 600px; width: 100%; perspective: 1000px; display: none; }
        .card { aspect-ratio: 1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .card.flipped, .card.matched { transform: rotateY(180deg); cursor: default; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 20px; font-weight: bold; text-align: center; padding: 5px; box-sizing: border-box; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-front { background-color: #3498db; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50%" y="50%" font-size="40" text-anchor="middle" dy=".3em" fill="white">?</text></svg>'); background-size: cover; }
        .card-back { background-color: white; color: #2c3e50; transform: rotateY(180deg); border: 2px solid #3498db; }
        .card.matched .card-back { background-color: #f1c40f; color: white; border-color: #f39c12; }

        /* 結算畫面設計 */
        #resultScreen { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; margin-top: 20px; border: 3px solid #f39c12; }
        #resultScreen h2 { color: #d35400; font-size: 28px; margin-top: 0; }
        .final-score { font-size: 48px; color: #e74c3c; font-weight: bold; margin: 15px 0; }
        .student-name { font-size: 22px; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🃏 三角記憶翻牌戰</h1>
        <p>找出對應的角度、弧度或三角比數值！</p>
    </div>

    <div class="controls">
        <button id="startBtn" class="btn-start" onclick="initGame()">開始挑戰 (60秒)</button>
    </div>

    <div id="playerInfo" style="margin-bottom: 15px; font-weight: bold; color: #2c3e50;"></div>

    <div class="game-info" id="gameInfo" style="display: none;">
        <span>積分: <span id="score">0</span></span>
        <span>時間: <span id="time">60</span>s</span>
    </div>

    <div class="grid" id="grid"></div>

    <!-- 結算截圖畫面 -->
    <div id="resultScreen">
        <h2>🎉 挑戰結束！</h2>
        <div class="student-name" id="finalName">姓名</div>
        <div>你的最終積分為：</div>
        <div class="final-score" id="finalScore">0</div>
        <p style="color: #7f8c8d; font-size: 14px;">請將此畫面截圖，回傳給老師作為作業依據。</p>
        <button class="btn-start" style="margin-top: 15px;" onclick="location.reload()">再玩一次刷高分</button>
    </div>

<script>
    const trigData = [
        { deg: "0°", rad: "0", sin: "0", cos: "1", tan: "0" },
        { deg: "30°", rad: "π/6", sin: "1/2", cos: "√3/2", tan: "√3/3" },
        { deg: "45°", rad: "π/4", sin: "√2/2", cos: "√2/2", tan: "1" },
        { deg: "60°", rad: "π/3", sin: "√3/2", cos: "1/2", tan: "√3" },
        { deg: "90°", rad: "π/2", sin: "1", cos: "0", tan: "不存在" },
        { deg: "120°", rad: "2π/3", sin: "√3/2", cos: "-1/2", tan: "-√3" },
        { deg: "135°", rad: "3π/4", sin: "√2/2", cos: "-√2/2", tan: "-1" },
        { deg: "150°", rad: "5π/6", sin: "1/2", cos: "-√3/2", tan: "-√3/3" },
        { deg: "180°", rad: "π", sin: "0", cos: "-1", tan: "0" },
        { deg: "210°", rad: "7π/6", sin: "-1/2", cos: "-√3/2", tan: "√3/3" },
        { deg: "225°", rad: "5π/4", sin: "-√2/2", cos: "-√2/2", tan: "1" },
        { deg: "240°", rad: "4π/3", sin: "-√3/2", cos: "-1/2", tan: "√3" },
        { deg: "270°", rad: "3π/2", sin: "-1", cos: "0", tan: "不存在" },
        { deg: "300°", rad: "5π/3", sin: "-√3/2", cos: "1/2", tan: "-√3" },
        { deg: "315°", rad: "7π/4", sin: "-√2/2", cos: "√2/2", tan: "-1" },
        { deg: "330°", rad: "11π/6", sin: "-1/2", cos: "√3/2", tan: "-√3/3" }
    ];

    let currentCards = [], flippedCards = [], matchedPairs = 0, score = 0, timeLeft = 60, timer, isFlipping = false;
    let playerName = "";

    function initGame() {
        if (!playerName) {
            playerName = prompt("請輸入你的「班級座號＋姓名」\n（例如：201-05 王小明），這將會顯示在結算截圖上：");
            if (!playerName) return; 
        }
        
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('playerInfo').innerText = `目前挑戰者：${playerName}`;
        startGame();
    }

    function generateDeck() {
        const deck = [];
        for (let i = 0; i < 6; i++) {
            const angle = trigData[Math.floor(Math.random() * trigData.length)];
            const type = Math.floor(Math.random() * 3) + 1;
            let cardA, cardB;
            if (type === 1) {
                cardA = angle.deg; cardB = angle.rad;
            } else {
                const funcName = ["sin", "cos", "tan"][Math.floor(Math.random() * 3)];
                if (angle.tan === "不存在" && funcName === "tan") {
                    cardA = `sin(${angle.deg})`; cardB = angle.sin;
                } else {
                    const isRad = Math.random() > 0.5;
                    cardA = `${funcName}(${isRad ? angle.rad : angle.deg})`;
                    cardB = angle[funcName];
                }
            }
            deck.push({ id: i, text: cardA }, { id: i, text: cardB });
        }
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        return deck;
    }

    function startGame() {
        clearInterval(timer);
        score = 0; timeLeft = 60; matchedPairs = 0;
        document.getElementById('score').innerText = score;
        document.getElementById('time').innerText = timeLeft;
        document.getElementById('gameInfo').style.display = 'flex';
        renderGrid();
        
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = ''; grid.style.display = 'grid';
        currentCards = generateDeck();
        
        currentCards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card'; cardEl.dataset.pairId = card.id;
            cardEl.innerHTML = `
                <div class="card-face card-front"></div>
                <div class="card-face card-back">${card.text}</div>
            `;
            cardEl.addEventListener('click', () => handleCardClick(cardEl));
            grid.appendChild(cardEl);
        });
    }

    function handleCardClick(cardEl) {
        if (isFlipping || cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
        cardEl.classList.add('flipped');
        flippedCards.push(cardEl);
        if (flippedCards.length === 2) {
            isFlipping = true;
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        if (card1.dataset.pairId === card2.dataset.pairId) {
            score += 20; matchedPairs++;
            document.getElementById('score').innerText = score;
            card1.classList.add('matched'); card2.classList.add('matched');
            flippedCards = []; isFlipping = false;
            
            if (matchedPairs === 6) {
                setTimeout(() => {
                    timeLeft += 10; renderGrid(); matchedPairs = 0;
                }, 800);
            }
        } else {
            score = Math.max(0, score - 5);
            document.getElementById('score').innerText = score;
            setTimeout(() => {
                card1.classList.remove('flipped'); card2.classList.remove('flipped');
                flippedCards = []; isFlipping = false;
            }, 1000);
        }
    }

    function endGame() {
        clearInterval(timer);
        document.getElementById('grid').style.display = 'none';
        document.getElementById('gameInfo').style.display = 'none';
        document.getElementById('playerInfo').style.display = 'none';
        
        const resultScreen = document.getElementById('resultScreen');
        resultScreen.style.display = 'block';
        document.getElementById('finalName').innerText = playerName;
        document.getElementById('finalScore').innerText = score + " 分";
    }
</script>
</body>
</html>
