<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高二先修：三角記憶翻牌戰</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; }
        h1 { color: #2c3e50; margin: 0 0 10px 0; }
        
        .container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 900px; }
        
        /* 左側遊戲區 */
        .game-panel { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); flex: 1; min-width: 300px; max-width: 500px; text-align: center; position: relative; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        button { padding: 12px 25px; font-size: 18px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; color: white; transition: 0.1s; width: 100%; margin-top: 10px; }
        
        .btn-start { background-color: #3498db; box-shadow: 0 4px 0 #2980b9; }
        .btn-start:active { transform: translateY(4px); box-shadow: 0 0 0 #2980b9; }
        
        /* 班級按鈕專屬樣式 */
        .btn-class { background-color: #9b59b6; box-shadow: 0 4px 0 #8e44ad; margin-bottom: 15px; }
        .btn-class:active { transform: translateY(4px); box-shadow: 0 0 0 #8e44ad; }
        .btn-test { background-color: #7f8c8d; box-shadow: 0 4px 0 #707b7c; }
        
        .stats { display: flex; justify-content: space-between; font-size: 18px; font-weight: bold; color: #e74c3c; margin-bottom: 15px; border-bottom: 2px dashed #eee; padding-bottom: 10px; }
        
        /* 翻牌遊戲專屬網格 */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; perspective: 1000px; }
        .card { aspect-ratio: 1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.5s; }
        .card.flipped, .card.matched { transform: rotateY(180deg); cursor: default; }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-size: 20px; font-weight: bold; text-align: center; padding: 5px; box-sizing: border-box; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card-front { background-color: #3498db; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50%" y="50%" font-size="40" text-anchor="middle" dy=".3em" fill="white">?</text></svg>'); background-size: cover; }
        .card-back { background-color: white; color: #2c3e50; transform: rotateY(180deg); border: 2px solid #3498db; }
        .card.matched .card-back { background-color: #f1c40f; color: white; border-color: #f39c12; }
        
        /* 右側即時排行榜 */
        .leaderboard-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 300px; border: 3px solid #f1c40f; }
        .leaderboard-panel h2 { text-align: center; color: #d35400; margin-top: 0; font-size: 22px; }
        .rank-list { list-style: none; padding: 0; margin: 0; }
        .rank-item { display: flex; justify-content: space-between; padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 16px; font-weight: bold; }
        .rank-item:nth-child(1) { color: #e67e22; font-size: 18px; background: #fff5e6; border-radius: 8px; }
        .rank-item:nth-child(2) { color: #7f8c8d; }
        .rank-item:nth-child(3) { color: #bdc3c7; }

        /* 隱藏區塊 */
        #loginSection, #gameSection, #resultSection { display: none; }
    </style>

    <!-- 引入 Firebase 核心套件 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // ⚠️ 老師請注意：務必換成你共用的那一組 Firebase 金鑰！
        const firebaseConfig = {
          apiKey: "AIzaSyD5TCsm03LPSR4zRRavUN8jR2d_-dI0giI",
  authDomain: "math-summer-camp-37878.firebaseapp.com",
  projectId: "math-summer-camp-37878",
  storageBucket: "math-summer-camp-37878.firebasestorage.app",
  messagingSenderId: "913471474686",
  appId: "1:913471474686:web:d16c1d51aa407ce418ceaf"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);

            window.fbGetDoc = getDoc;
            window.fbSetDoc = setDoc;
            window.fbDoc = doc;
            window.fbIncrement = increment;
            window.fbQuery = query;
            window.fbCollection = collection;
            window.fbOrderBy = orderBy;
            window.fbLimit = limit;
            window.fbOnSnapshot = onSnapshot;

        } catch(e) {
            console.error("Firebase 初始化失敗，請檢查金鑰：", e);
        }
    </script>
</head>
<body>

    <div class="header">
        <h1>🃏 三角記憶翻牌戰</h1>
        <p style="color: #7f8c8d;">支援即時連線！找出對應的數值消除吧</p>
    </div>

    <div class="container">
        <!-- 左側面板 -->
        <div class="game-panel">
            
            <!-- 1. 選擇班級區塊 -->
            <div id="classSelectionSection">
                <h3 style="color: #2c3e50;">👋 請先選擇你的班級</h3>
                <button class="btn-class btn-test" onclick="selectClass('測試版', 'match_test')">🛠️ 1. 測試版</button>
                <div style="margin: 20px 0; border-top: 1px dashed #bdc3c7;"></div>
                <button class="btn-class" onclick="selectClass('A班 (202)', 'match_202')">🏫 2. A 班 (202)</button>
                <button class="btn-class" onclick="selectClass('B班 (203)', 'match_203')">🏫 3. B 班 (203)</button>
                <button class="btn-class" onclick="selectClass('D班 (205)', 'match_205')">🏫 4. D 班 (205)</button>
            </div>

            <!-- 2. 登入區塊 -->
            <div id="loginSection">
                <div style="background: #e8f8f5; padding: 10px; border-radius: 8px; margin-bottom: 15px; color: #16a085; font-weight: bold;">
                    目前選擇：<span id="displaySelectedClass"></span>
                    <a href="#" onclick="reselectClass()" style="font-size: 14px; margin-left: 10px; color: #7f8c8d;">(重新選擇)</a>
                </div>
                
                <h3>輸入身分開始翻牌</h3>
                <p style="color: #e74c3c; font-size: 15px; font-weight: bold; margin-bottom: 15px;">
                    ⚠️ 提示：配對成功 +20 分，翻錯倒扣 5 分！
                </p>

                <input type="text" id="accInput" placeholder="請輸入「高二」學號 (範例: 20205)">
                <input type="text" id="nameInput" placeholder="請輸入「姓名」 (顯示於排行榜)">
                <button class="btn-start" onclick="initGame()">進入戰場 (60秒)</button>
            </div>

            <!-- 3. 遊戲區塊 (換成對對碰的網格) -->
            <div id="gameSection">
                <div class="stats">
                    <span>挑戰者: <span id="playerNameDisplay" style="color:#3498db;"></span></span>
                    <span>時間: <span id="time">60</span>s</span>
                </div>
                <div style="font-size:14px; color:#7f8c8d; text-align:left; margin-bottom:15px;">本次得分: <span id="sessionScoreDisplay">0</span></div>
                
                <div class="grid" id="grid"></div>
            </div>

            <!-- 4. 結算區塊 -->
            <div id="resultSection">
                <h2>🎉 時間到！</h2>
                <div style="font-size: 20px; color: #34495e; margin: 10px 0;">單局獲得：<span id="finalSessionScore" style="color:#2ecc71; font-weight:bold;">0</span> 分</div>
                <div style="font-size: 16px; color: #7f8c8d; margin-top: 20px;">你的雲端總積分已更新為</div>
                <div style="font-size: 48px; color: #e74c3c; font-weight: bold; margin: 10px 0;" id="finalTotalScore">0</div>
                <button class="btn-start" onclick="startRound()">再玩一局繼續刷！</button>
            </div>

        </div>

        <!-- 右側面板 -->
        <div class="leaderboard-panel">
            <h2 id="leaderboardTitle">🏆 翻牌戰排行榜</h2>
            <ul class="rank-list" id="rankList">
                <li class="rank-item" style="justify-content:center; color:#95a5a6;">請先選擇班級...</li>
            </ul>
        </div>
    </div>

<script>
    const trigData = [
        { deg: "0°", rad: "0", sin: "0", cos: "1", tan: "0" },
        { deg: "30°", rad: "π/6", sin: "1/2", cos: "√3/2", tan: "√3/3" },
        { deg: "45°", rad: "π/4", sin: "√2/2", cos: "√2/2", tan: "1" },
        { deg: "60°", rad: "π/3", sin: "√3/2", cos: "1/2", tan: "√3" },
        { deg: "90°", rad: "π/2", sin: "1", cos: "0", tan: "不存在" },
        { deg: "120°", rad: "2π/3", sin: "√3/2", cos: "-1/2", tan: "-√3" },
        { deg: "135°", rad: "3π/4", sin: "√2/2", cos: "-√2/2", tan: "-1" },
        { deg: "150°", rad: "5π/6", sin: "1/2", cos: "-√3/2", tan: "-√3/3" },
        { deg: "180°", rad: "π", sin: "0", cos: "-1", tan: "0" },
        { deg: "210°", rad: "7π/6", sin: "-1/2", cos: "-√3/2", tan: "√3/3" },
        { deg: "225°", rad: "5π/4", sin: "-√2/2", cos: "-√2/2", tan: "1" },
        { deg: "240°", rad: "4π/3", sin: "-√3/2", cos: "-1/2", tan: "√3" },
        { deg: "270°", rad: "3π/2", sin: "-1", cos: "0", tan: "不存在" },
        { deg: "300°", rad: "5π/3", sin: "-√3/2", cos: "1/2", tan: "-√3" },
        { deg: "315°", rad: "7π/4", sin: "-√2/2", cos: "√2/2", tan: "-1" },
        { deg: "330°", rad: "11π/6", sin: "-1/2", cos: "√3/2", tan: "-√3/3" }
    ];

    let playerAcc = "", playerName = "";
    let sessionScore = 0, cloudTotalScore = 0;
    let timeLeft = 60, timer;
    
    // 對對碰專屬變數
    let currentCards = [], flippedCards = [], matchedPairs = 0, isFlipping = false;

    // 多班級變數設定
    let currentClassName = "";
    let currentDbCollection = "";
    let leaderboardUnsubscribe = null;

    window.onload = function() {
        if(localStorage.getItem('savedAcc')) document.getElementById('accInput').value = localStorage.getItem('savedAcc');
        if(localStorage.getItem('savedName')) document.getElementById('nameInput').value = localStorage.getItem('savedName');
    };

    function selectClass(className, dbCollection) {
        currentClassName = className;
        currentDbCollection = dbCollection;
        
        document.getElementById('classSelectionSection').style.display = 'none';
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('displaySelectedClass').innerText = className;
        document.getElementById('leaderboardTitle').innerText = `🏆 ${className} 排行榜`;
        
        startLeaderboard();
    }

    function reselectClass() {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('classSelectionSection').style.display = 'block';
        document.getElementById('leaderboardTitle').innerText = `🏆 翻牌戰排行榜`;
        document.getElementById('rankList').innerHTML = '<li class="rank-item" style="justify-content:center; color:#95a5a6;">請先選擇班級...</li>';
        
        if (leaderboardUnsubscribe) {
            leaderboardUnsubscribe();
            leaderboardUnsubscribe = null;
        }
    }

    function startLeaderboard() {
        if (!window.db) return;
        if (leaderboardUnsubscribe) leaderboardUnsubscribe();

        const q = window.fbQuery(window.fbCollection(window.db, currentDbCollection), window.fbOrderBy("totalScore", "desc"), window.fbLimit(10));
        
        leaderboardUnsubscribe = window.fbOnSnapshot(q, (snapshot) => {
            const list = document.getElementById('rankList');
            list.innerHTML = '';
            let rank = 1;
            snapshot.forEach((doc) => {
                const data = doc.data();
                const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : `${rank}.`;
                list.innerHTML += `<li class="rank-item"><span>${medal} ${data.name}</span><span>${data.totalScore} 分</span></li>`;
                rank++;
            });
            if(snapshot.empty) list.innerHTML = '<li class="rank-item">該班級目前尚無挑戰者</li>';
        }, (error) => {
            console.error("排行榜讀取失敗：", error);
        });
    }

    async function initGame() {
        if(!window.db) return alert("Firebase 尚未成功連接，請檢查金鑰設定。");
        
        playerAcc = document.getElementById('accInput').value.trim();
        playerName = document.getElementById('nameInput').value.trim();
        if (!playerAcc || !playerName) return alert("請輸入「高二班級+座號」與「姓名」！");

        localStorage.setItem('savedAcc', playerAcc);
        localStorage.setItem('savedName', playerName);

        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('playerNameDisplay').innerText = playerName;
        
        try {
            const docRef = window.fbDoc(window.db, currentDbCollection, playerAcc);
            const docSnap = await window.fbGetDoc(docRef);
            if (docSnap.exists()) cloudTotalScore = docSnap.data().totalScore || 0;
            else cloudTotalScore = 0;
        } catch (e) {
            console.error("讀取分數失敗", e);
        }

        startRound();
    }

    function startRound() {
        document.getElementById('resultSection').style.display = 'none';
        document.getElementById('gameSection').style.display = 'block';
        sessionScore = 0;
        timeLeft = 60;
        matchedPairs = 0;
        isFlipping = false;
        
        document.getElementById('sessionScoreDisplay').innerText = sessionScore;
        document.getElementById('time').innerText = timeLeft;

        renderGrid();
        
        clearInterval(timer);
        timer = setInterval(() => {
            timeLeft--;
            document.getElementById('time').innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    // --- 對對碰核心邏輯開始 ---
    function generateDeck() {
        const deck = [];
        for (let i = 0; i < 6; i++) {
            const angle = trigData[Math.floor(Math.random() * trigData.length)];
            const type = Math.floor(Math.random() * 3) + 1;
            let cardA, cardB;
            if (type === 1) {
                cardA = angle.deg; cardB = angle.rad;
            } else {
                const funcName = ["sin", "cos", "tan"][Math.floor(Math.random() * 3)];
                if (angle.tan === "不存在" && funcName === "tan") {
                    cardA = `sin(${angle.deg})`; cardB = angle.sin;
                } else {
                    const isRad = Math.random() > 0.5;
                    cardA = `${funcName}(${isRad ? angle.rad : angle.deg})`;
                    cardB = angle[funcName];
                }
            }
            deck.push({ id: i, text: cardA }, { id: i, text: cardB });
        }
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        return deck;
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = ''; 
        currentCards = generateDeck();
        
        currentCards.forEach((card, index) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card'; cardEl.dataset.pairId = card.id;
            cardEl.innerHTML = `
                <div class="card-face card-front"></div>
                <div class="card-face card-back">${card.text}</div>
            `;
            cardEl.addEventListener('click', () => handleCardClick(cardEl));
            grid.appendChild(cardEl);
        });
    }

    function handleCardClick(cardEl) {
        if (isFlipping || cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
        cardEl.classList.add('flipped');
        flippedCards.push(cardEl);
        if (flippedCards.length === 2) {
            isFlipping = true;
            checkMatch();
        }
    }

    function checkMatch() {
        const [card1, card2] = flippedCards;
        if (card1.dataset.pairId === card2.dataset.pairId) {
            sessionScore += 20; 
            matchedPairs++;
            document.getElementById('sessionScoreDisplay').innerText = sessionScore;
            
            card1.classList.add('matched'); card2.classList.add('matched');
            flippedCards = []; isFlipping = false;
            
            if (matchedPairs === 6) {
                setTimeout(() => {
                    timeLeft += 10; // 全對獎勵時間
                    renderGrid(); matchedPairs = 0;
                }, 800);
            }
        } else {
            sessionScore = Math.max(0, sessionScore - 5); // 翻錯扣分
            document.getElementById('sessionScoreDisplay').innerText = sessionScore;
            
            setTimeout(() => {
                card1.classList.remove('flipped'); card2.classList.remove('flipped');
                flippedCards = []; isFlipping = false;
            }, 1000);
        }
    }
    // --- 對對碰核心邏輯結束 ---

    async function endGame() {
        clearInterval(timer);
        document.getElementById('gameSection').style.display = 'none';
        document.getElementById('resultSection').style.display = 'block';
        document.getElementById('finalSessionScore').innerText = sessionScore;

        if (sessionScore > 0) {
            cloudTotalScore += sessionScore; 
            document.getElementById('finalTotalScore').innerText = cloudTotalScore;

            try {
                const docRef = window.fbDoc(window.db, currentDbCollection, playerAcc);
                await window.fbSetDoc(docRef, {
                    name: playerName,
                    totalScore: window.fbIncrement(sessionScore),
                    lastPlayed: new Date()
                }, { merge: true });
            } catch (e) {
                console.error("上傳雲端失敗", e);
                alert("網路異常，分數上傳失敗！");
            }
        } else {
            document.getElementById('finalTotalScore').innerText = cloudTotalScore;
        }
    }
</script>
</body>
</html>
